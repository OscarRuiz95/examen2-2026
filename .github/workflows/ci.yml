name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Pruebas (Laravel + Pest)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, sqlite3, pdo_sqlite, bcmath
          coverage: none

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Instalar dependencias de Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generar la APP_KEY
        run: php artisan key:generate

      - name: Levantar la base de datos de pruebas (SQLite)
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Ejecutar las migraciones
        run: php artisan migrate --force

      - name: Ejecutar las pruebas
        run: php artisan test